<?xml version="1.0" encoding="UTF-8"?>
<!-- *** es_systems.cfg edited for Batocera by RGS TEAM ***-->
<systemList>
  <system>
        <fullname>Sega Channel</fullname>
        <name>segachannel</name>
        <manufacturer>Sega</manufacturer>
        <release>1994</release>
        <hardware>console</hardware>
        <path>/userdata/roms/segachannel</path>
        <extension>.68k .sgd .smd .bin .gen .md .sg .wad .zip .7z</extension>
        <command>emulatorlauncher %CONTROLLERSCONFIG% -system megadrive -rom %ROM% -gameinfoxml %GAMEINFOXML% -systemname %SYSTEMNAME% -emulator %EMULATOR% -core %CORE%</command>
        <platform>megadrive,genesis</platform>
        <theme>segachannel</theme>
        <emulators>
            <emulator name="libretro">
                <cores>
                    <core default="true">genesisplusgx-expanded</core>
                    <core>blastem</core>
                    <core>genesisplusgx</core>
                    <core>genesisplusgx-wide</core>
                    <core>picodrive</core>
                </cores>
            </emulator>
        </emulators>
  </system>
</systemList>