<?xml version="1.0" encoding="UTF-8"?>
<!-- *** es_systems.cfg edited for Batocera by RGS TEAM ***-->
<systemList>
  <system>
        <fullname>Sharp MZ-2200</fullname>
        <name>mz2200</name>
        <manufacturer>Sharp</manufacturer>
        <release>1983</release>
        <hardware>computer</hardware>
        <path>/userdata/roms/mz2200</path>
        <extension>.mzf .mzt .m12 .wav .d88 .dsk .zip .7z</extension>
        <command>emulatorlauncher %CONTROLLERSCONFIG% -system %SYSTEM% -rom %ROM% -gameinfoxml %GAMEINFOXML% -systemname %SYSTEMNAME%</command>
        <platform>mz2000</platform>
        <theme>mz2200</theme>
        <emulators>
            <emulator name="libretro">
                <cores>
                    <core default="true">mame</core>
                </cores>
            </emulator>
            <emulator name="mame">
                <cores>
                    <core>mame</core>
                </cores>
            </emulator>
        </emulators>
  </system>
</systemList>
